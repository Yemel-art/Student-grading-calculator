name: student_grading_calculator
description: A Flutter Desktop application for calculating and managing student grades.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.1
  # File picking
  file_picker: ^6.1.1
  # Excel parsing
  excel: ^4.0.2
  # CSV parsing
  csv: ^5.1.1
  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Path utilities
  path_provider: ^2.1.2
  path: ^1.9.0
  # UI utilities
  intl: ^0.19.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
